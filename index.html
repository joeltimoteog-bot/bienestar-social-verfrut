<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login · Bienestar Social - RR.LL.</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="bs-login-bg">

  <style>
    /* ── Fondo animado estilo portal RR.LL ── */
    body.bs-login-bg {
      position: relative; overflow: hidden; margin: 0; padding: 24px;
      min-height: 100vh;
      display: flex !important; align-items: center !important; justify-content: center !important;
      background: linear-gradient(135deg, #0a2463 0%, #122f7a 40%, #1e3a8a 68%, #3a1a5e 100%) !important;
    }

    /* ── Centrado del logo y contenido de la tarjeta ── */
    .bs-login-card { width: 100%; max-width: 400px; margin: 0 auto; padding: 2.1rem 1.9rem 1.6rem; text-align: center !important; }
    .bs-login-logo-img { display: block !important; margin: 0 auto 12px !important; }
    .bs-login-title, .bs-login-subtitle, .bs-footer-text { text-align: center !important; }
    .bs-login-divider { margin-left: auto !important; margin-right: auto !important; }
    /* El formulario mantiene etiquetas a la izquierda para fácil lectura */
    .bs-login-card form, .bs-form-group, .bs-label { text-align: left; }
    #alertContainer, .bs-lock-box { text-align: center; }
    #bsCanvas { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .bs-halo { position: fixed; border-radius: 50%; filter: blur(90px); opacity: .35; pointer-events: none; z-index: 0; }
    .bs-halo.h1 { width: 420px; height: 420px; background: #dc2626; top: -120px; left: -100px; }
    .bs-halo.h2 { width: 480px; height: 480px; background: #0ea5e9; bottom: -160px; right: -120px; }

    /* ── Tarjeta con efecto vidrio ── */
    .bs-login-card {
      position: relative; z-index: 2;
      animation: bs-rise .5s ease both;
      background: rgba(255,255,255,.94) !important;
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,.55);
      border-radius: 18px !important;
      box-shadow: 0 24px 70px rgba(0,0,0,.45) !important;
      overflow: hidden;
    }
    .bs-login-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px;
      background: linear-gradient(90deg, #C8102E 0%, #C8102E 45%, #003DA5 55%, #003DA5 100%);
    }
    .bs-login-title { letter-spacing: -.02em; }
    .bs-input:focus { border-color: #003DA5 !important; box-shadow: 0 0 0 3px rgba(0,61,165,.15) !important; }
    .bs-btn-login { background: linear-gradient(120deg, #003DA5, #0050C8) !important; transition: transform .15s ease, box-shadow .15s ease; }
    .bs-btn-login:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 10px 26px rgba(0,61,165,.4); }
    .bs-shake { animation: bs-shake .45s ease; }
    @keyframes bs-shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-9px)} 40%,80%{transform:translateX(9px)} }
    .bs-lock-box { background: rgba(200,16,46,.08); border: 1px solid rgba(200,16,46,.3); border-radius: 10px; padding: .6rem .8rem; font-size: .8rem; color: #C8102E; font-weight: 700; text-align: center; margin-bottom: .8rem; display: none; }

    .bs-login-card { animation: bs-rise .45s ease both; }
    .bs-login-logo-img { display: block; margin: 0 auto 12px; height: 58px; width: auto; background: #fff; border-radius: 12px; padding: 6px 12px; box-shadow: 0 2px 10px rgba(0,0,0,.08); }
    .bs-login-divider { width: 48px; height: 3px; margin: 10px auto 16px; border-radius: 2px; background: linear-gradient(90deg, var(--bs-primary), var(--bs-secondary)); }
    .bs-btn-login { width: 100%; padding: .8rem; font-size: .95rem; letter-spacing: .03em; }
    .bs-caps-hint { display: none; font-size: .75rem; color: var(--bs-warning); font-weight: 600; margin-top: 4px; }
    .bs-welcome-overlay { position: fixed; inset: 0; z-index: 9999; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; color: #fff; background: linear-gradient(120deg, #0a2463 0%, #122f7a 45%, #1e3a8a 70%, #3a1a5e 100%); animation: bs-fade .35s ease both; }
    .bs-welcome-overlay.bs-active { display: flex; }
    .bs-welcome-wave { font-size: 3.2rem; display: inline-block; animation: bs-wave 1.4s ease infinite; transform-origin: 70% 70%; }
    .bs-welcome-title { font-size: 1.9rem; font-weight: 700; margin: .6rem 0 .2rem; }
    .bs-welcome-title .nm { color: #ffd8d5; }
    .bs-welcome-sub { font-size: 1rem; opacity: .92; }
    .bs-welcome-loading { margin-top: 1.6rem; font-size: .85rem; opacity: .85; display: flex; flex-direction: column; align-items: center; gap: .5rem; }
    @keyframes bs-wave { 0%,60%,100%{transform:rotate(0)} 10%,30%{transform:rotate(16deg)} 20%,40%{transform:rotate(-8deg)} }
    @keyframes bs-fade { from{opacity:0} to{opacity:1} }
    @keyframes bs-rise { from{opacity:0; transform:translateY(14px)} to{opacity:1; transform:none} }
  </style>

  <canvas id="bsCanvas"></canvas>
  <div class="bs-halo h1"></div>
  <div class="bs-halo h2"></div>

  <div class="bs-login-card">
    <img src="images/logo-unifrutti-hd.png" alt="Unifrutti" class="bs-login-logo-img" onerror="this.outerHTML='&lt;div class=&quot;bs-login-logo&quot;&gt;BS&lt;/div&gt;'">
    <h1 class="bs-login-title">Bienestar Social</h1>
    <p class="bs-login-subtitle">Equipo Relaciones Laborales · Unifrutti</p>
    <div class="bs-login-divider"></div>

    <div id="alertContainer"></div>
    <div class="bs-lock-box" id="lockBox">🔒 Demasiados intentos fallidos.<br>Espera <span id="lockSeg">60</span> s para volver a intentar.</div>

    <form id="loginForm" autocomplete="off">
      <div class="bs-form-group">
        <label class="bs-label" for="usuario">Usuario</label>
        <input type="text" id="usuario" name="usuario" class="bs-input" required autofocus autocomplete="off" placeholder="Ingresa tu usuario">
      </div>

      <div class="bs-form-group">
        <label class="bs-label" for="password">Contraseña</label>
        <div class="bs-input-wrap">
          <input type="password" id="password" name="password" class="bs-input" required autocomplete="off" placeholder="Ingresa tu contraseña">
          <button type="button" class="bs-eye" id="btnEye" title="Mostrar contraseña" aria-label="Mostrar contraseña">👁</button>
        </div>
        <div class="bs-caps-hint" id="capsHint">⚠ Mayúsculas activadas (Bloq Mayús)</div>
      </div>

      <button type="submit" id="btnLogin" class="bs-btn bs-btn-primary bs-btn-login">
        <span id="btnText">Ingresar</span>
        <div id="btnDots" class="bs-dots bs-dots-light bs-hidden"><span></span><span></span><span></span></div>
      </button>
    </form>

    <p class="bs-footer-text">
      Creado por <strong>Joel Angel Timoteo Gonza</strong><br>
      Unifrutti Group · RAPEL S.A.C. / VERFRUT S.A.C.<br>
      v1.1.0
    </p>
  </div>

  <!-- Overlay de bienvenida personalizada -->
  <div class="bs-welcome-overlay" id="welcomeOverlay" aria-hidden="true">
    <span class="bs-welcome-wave">👋</span>
    <div class="bs-welcome-title">¡Hola, <span class="nm" id="welcomeNombre"></span>!</div>
    <div class="bs-welcome-sub" id="welcomeMsg"></div>
    <div class="bs-welcome-loading">
      <div class="bs-dots bs-dots-light bs-dots-lg"><span></span><span></span><span></span></div>
      Preparando tus módulos...
    </div>
  </div>

  <script>
    // ===== CONFIGURACIÓN =====
    const BS_API_URL = 'https://script.google.com/macros/s/AKfycbyJIUtdpApEc35Jj4ZNP-3ONqGe64J1VhaRvkt87vVUNTgSagrOgOS0T99eIt0-w3Yi/exec';

    // ===== DOM refs =====
    const form = document.getElementById('loginForm');
    const btnLogin = document.getElementById('btnLogin');
    const btnText = document.getElementById('btnText');
    const btnDots = document.getElementById('btnDots');
    const alertContainer = document.getElementById('alertContainer');

    // ===== Fondo animado: partículas suaves (estilo portal RR.LL) =====
    (function(){
      try {
        var cv = document.getElementById('bsCanvas'), cx = cv.getContext('2d');
        var P = [];
        function resize(){ cv.width = innerWidth; cv.height = innerHeight; }
        resize(); addEventListener('resize', resize);
        for (var i = 0; i < 55; i++) P.push({
          x: Math.random()*innerWidth, y: Math.random()*innerHeight,
          r: Math.random()*2.2 + .6,
          vx: (Math.random()-.5)*.35, vy: (Math.random()-.5)*.35,
          o: Math.random()*.5 + .15
        });
        (function tick(){
          cx.clearRect(0,0,cv.width,cv.height);
          P.forEach(function(p){
            p.x += p.vx; p.y += p.vy;
            if (p.x < 0 || p.x > cv.width) p.vx *= -1;
            if (p.y < 0 || p.y > cv.height) p.vy *= -1;
            cx.beginPath();
            cx.arc(p.x, p.y, p.r, 0, Math.PI*2);
            cx.fillStyle = 'rgba(255,255,255,' + p.o + ')';
            cx.fill();
          });
          requestAnimationFrame(tick);
        })();
      } catch(e) {}
    })();

    // ===== Recordar último usuario =====
    try {
      var _ultimo = localStorage.getItem('bs_ultimo_usuario');
      if (_ultimo) {
        document.getElementById('usuario').value = _ultimo;
        setTimeout(function(){ document.getElementById('password').focus(); }, 150);
      }
    } catch(e) {}

    // ===== Límite de intentos: 3 fallidos → bloqueo de 60 s =====
    var _intentos = 0, _bloqueadoHasta = 0, _lockTimer = null;
    function bloquear() {
      _bloqueadoHasta = Date.now() + 60000;
      var box = document.getElementById('lockBox');
      box.style.display = 'block';
      btnLogin.disabled = true;
      clearInterval(_lockTimer);
      _lockTimer = setInterval(function(){
        var falta = Math.ceil((_bloqueadoHasta - Date.now())/1000);
        if (falta <= 0) {
          clearInterval(_lockTimer);
          box.style.display = 'none';
          btnLogin.disabled = false;
          _intentos = 0;
          clearAlert();
        } else {
          document.getElementById('lockSeg').textContent = falta;
        }
      }, 250);
    }
    function sacudir() {
      var card = document.querySelector('.bs-login-card');
      card.classList.remove('bs-shake');
      void card.offsetWidth;
      card.classList.add('bs-shake');
    }

    // ===== Mostrar/ocultar contraseña + aviso de Bloq Mayús =====
    const passInput = document.getElementById('password');
    document.getElementById('btnEye').addEventListener('click', function() {
      const show = passInput.type === 'password';
      passInput.type = show ? 'text' : 'password';
      this.textContent = show ? '🙈' : '👁';
      this.title = show ? 'Ocultar contraseña' : 'Mostrar contraseña';
      passInput.focus();
    });
    passInput.addEventListener('keyup', function(e) {
      if (e.getModifierState) {
        document.getElementById('capsHint').style.display = e.getModifierState('CapsLock') ? 'block' : 'none';
      }
    });

    // ===== Saludo personalizado con género (~90%) =====
    function _sinTilde(s){ return (s||'').normalize('NFD').replace(/[\u0300-\u036f]/g,'').toLowerCase(); }
    function generoPorNombre(nombre){
      var p = _sinTilde(String(nombre||'').trim().split(/\s+/)[0]);
      if (!p) return 'n';
      var fem = ['carol','maria','rosa','ana','luz','flor','carmen','isabel','patricia','sandra','monica','veronica','claudia','gladys','janet','yanet','yesenia','yessenia','katherine','katia','karen','karla','fiorella','milagros','mercedes','esther','ester','ruth','elizabeth','lisbeth','lizbeth','vanessa','paola','pamela','diana','silvia','sonia','susana','teresa','gloria','irma','norma','olga','doris','edith','judith','ingrid','miriam','myriam','nancy','betty','lourdes','pilar','rocio','soledad','victoria','virginia','ximena','zoila'];
      if (fem.indexOf(p) >= 0) return 'f';
      if (/[oa]$/.test(p)) return p.charAt(p.length-1) === 'a' ? 'f' : 'm';
      return 'n';
    }
    function mensajeBienvenida(nombre){
      var g = generoPorNombre(nombre);
      var sufijo = g === 'f' ? 'Bienvenida' : (g === 'm' ? 'Bienvenido' : 'Te damos la bienvenida');
      var h = new Date().getHours();
      var momento = h < 12 ? 'Buenos días' : (h < 19 ? 'Buenas tardes' : 'Buenas noches');
      return momento + ' · ' + sufijo + ' al sistema de Bienestar Social';
    }
    function mostrarBienvenida(nombre){
      var primer = String(nombre || '').trim().split(/\s+/)[0] || 'usuario';
      primer = primer.charAt(0).toUpperCase() + primer.slice(1).toLowerCase();
      document.getElementById('welcomeNombre').textContent = primer;
      document.getElementById('welcomeMsg').textContent = mensajeBienvenida(nombre);
      document.getElementById('welcomeOverlay').classList.add('bs-active');
    }

    // ===== Sesión existente -> redirigir =====
    const session = localStorage.getItem('bienestarSocialAuth');
    if (session) {
      try {
        const data = JSON.parse(session);
        if (data && data.usuario) {
          window.location.href = 'portal.html';
        }
      } catch(e) {
        localStorage.removeItem('bienestarSocialAuth');
      }
    }

    // ===== Helpers UI =====
    function showAlert(msg, tipo) {
      tipo = tipo || 'danger';
      alertContainer.innerHTML = '<div class="bs-alert bs-alert-' + tipo + '">' + msg + '</div>';
    }
    function clearAlert() { alertContainer.innerHTML = ''; }
    function setLoading(state) {
      btnLogin.disabled = state;
      if (state) {
        btnText.textContent = 'Ingresando';
        btnDots.classList.remove('bs-hidden');
      } else {
        btnText.textContent = 'Ingresar';
        btnDots.classList.add('bs-hidden');
      }
    }

    // ===== Submit =====
    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      clearAlert();

      if (Date.now() < _bloqueadoHasta) return;

      const usuario = document.getElementById('usuario').value.trim();
      const password = document.getElementById('password').value;

      if (!usuario || !password) {
        showAlert('Por favor completa todos los campos');
        sacudir();
        return;
      }

      setLoading(true);
      try {
        // GAS WebApp: usar text/plain para evitar CORS preflight
        const res = await fetch(BS_API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify({
            action: 'bs_login',
            usuario: usuario,
            password: password
          })
        });

        const data = await res.json();

        if (data.ok) {
          try { localStorage.setItem('bs_ultimo_usuario', usuario); } catch(e) {}
          localStorage.setItem('bienestarSocialAuth', JSON.stringify({
            usuario: data.user.usuario,
            nombre: data.user.nombre,
            rol: data.user.rol,
            permisos: data.user.permisos,
            token: data.user.token || data.token || '',
            loginAt: new Date().toISOString()
          }));
          mostrarBienvenida(data.user.nombre || data.user.usuario);
          setTimeout(function() { window.location.href = 'portal.html'; }, 1400);
        } else {
          _intentos++;
          setLoading(false);
          sacudir();
          document.getElementById('password').value = '';
          if (_intentos >= 3) {
            showAlert('Demasiados intentos fallidos.');
            bloquear();
          } else {
            showAlert((data.message || 'Usuario o contraseña incorrectos') + ' · Intento ' + _intentos + ' de 3');
          }
        }
      } catch(err) {
        console.error(err);
        showAlert('Error de conexión. Verifica tu internet.');
        setLoading(false);
      }
    });
  </script>

</body>
</html>
